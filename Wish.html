<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="monetag" content="3752379b3bad0f3ab0073bbd593d0f45" />
<title>Poson Full Moon Day | 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow-x: hidden; scroll-behavior: smooth; }

body {
  background: linear-gradient(180deg,#0b1020 0%,#1a0f2e 100%);
  color: #fff;
  font-family: 'Noto Sans Sinhala', Arial, sans-serif;
}

.wrap { max-width: 420px; margin: 0 auto; }

/* නෙළුම පායනවා */
.lotus { font-size: 48px; margin-bottom: 12px; animation: glow 2s ease-in-out infinite alternate; }
@keyframes glow { from {text-shadow: 0 0 10px #ffd700;} to {text-shadow: 0 0 20px #ffd700, 0 0 30px #ffd700;} }

/* මල් පොහොට්ටු */
.petal {
  position: fixed;
  top: -10%;
  color: #ffd700;
  font-size: 20px;
  opacity: 0.4; /* Podaak mala kara ganna */
  z-index: -1;  /* Card eka yata yanna -1 kala */
  pointer-events: none;
  filter: blur(3px); /* Me line eka ahu. Blur karanne meken */
  animation-name: fall, sway;
  animation-timing-function: linear, ease-in-out;
  animation-iteration-count: infinite;
}
@keyframes fall { 0% { top: -10%; } 100% { top: 110%; } }
@keyframes sway { 0% { transform: translateX(0) rotate(0deg); } 50% { transform: translateX(100px) rotate(180deg); } 100% { transform: translateX(0) rotate(360deg); } }  
  
/* Full Screen Card */
.full-card {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
}
.card {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(212,175,55,0.3);
  border-radius: 20px;
  padding: 24px 24px 10px 24px;
  text-align: center;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 0 30px rgba(212,175,55,0.2);
  width: 100%;
  position: relative;
}
.lotus { font-size: 48px; margin-bottom: 12px; }
h1 { font-size: 22px; color: #ffd700; margin-bottom: 16px; }
.wish-text {
  font-size: 17px;
  line-height: 1.9;
  color: #eee;
  background: rgba(0,0,0,0.2);
  padding: 18px;
  border-radius: 12px;
  margin: 16px 0;
  min-height: 90px;
}
.from { font-size: 15px; color: #f0060; margin-bottom: 24px; }
  
.btn {
  width: 100%;
  background: linear-gradient(90deg,#d4af37,#ffd700);
  color: #000;
  border: none;
  border-radius: 24px;
  padding: 16px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 10px;
}

/* === CHANGE 1: Scroll Hint Card eka Athulata === */
.scroll-hint {
  position: relative; /* absolute ain kala */
  bottom: 0;
  font-size: 12px;
  color: #f0060;
  animation: bounce 2s infinite;
  text-align: center;
  margin-top: 5px; /* Button eka yatin gap eka */
}
.scroll-hint span { display: block; font-size: 20px; }
@keyframes bounce {
 0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
 40% { transform: translateY(-6px); }
 60% { transform: translateY(-3px); }
}

/* Maker Section */
.maker-section {
  min-height: 100vh;
  padding: 40px 20px;
  display: flex;
  align-items: center;
}
.maker-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(212,175,55,0.3);
  border-radius: 20px;
  padding: 24px;
  text-align: center;
  backdrop-filter: blur(10px);
  width: 100%;
}
.maker-title { font-size: 18px; color: #ffd700; margin-bottom: 16px; }

/* === CHANGE 2: Input Field Gap Dala === */
.input-group { margin-bottom: 12px; } /* Name eka yata gap eka */

.input-wrap { position: relative; } /* Meke margin eka ain kala */
input {
  width: 100%;
  background: #272727;
  border: 1px solid #444;
  border-radius: 12px;
  padding: 14px 45px 14px 14px;
  color: #fff;
  margin-bottom: 12px; 
  font-size: 16px;
  font-family: 'Noto Sans Sinhala', sans-serif;
  outline: none;

}
/* AI Icon Button */
.ai-btn {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: linear-gradient(135deg,#8a2be2,#ff6a00);
  border: none;
  border-radius: 50%;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.ai-btn svg { width: 18px; height: 18px; fill: #fff; }
.ai-btn:active { transform: translateY(-50%) scale(0.9); }
</style>
</head>
<body>
<div class="wrap">

  <!-- SECTION 1: Full Screen Wish -->
  <section class="full-card" id="section1">
    <div class="card">
      <div class="lotus">🪷</div>
      <h1>පොසොන් පුර පසළොස්වක පෝය</h1>
      <div class="wish-text" id="wishText"></div>
      <div class="from" id="fromText"></div>

      <!-- Hint eka methanata awe card eka athulata -->
      <div class="scroll-hint">
        ඔබත් එකක් හදන්න ⬇
      </div>
    </div>
  </section>

  <!-- SECTION 2: Maker -->
  <section class="maker-section" id="section2">
    <div class="maker-card">
      <div class="maker-title">➕ Create My Own</div>

      <!-- Name field eka wrapper ekakata dala gap eka set kala -->
      <div class="input-group">
        <input type="text" id="nameInput" placeholder="Enter Your Name" maxlength="20">
      </div>

      <div class="input-wrap">
        <input type="text" id="msgInput" placeholder="Enter Wish Message" maxlength="60">
        <button type="button" class="ai-btn" onclick="generateWish()" title="AI Wish">
          <svg viewBox="0 0 24 24">
            <path d="M12,2L15.09,8.26L22,9.27L17,14.14L18.18,21.02L12,17.77L5.82,21.02L7,14.14L2,9.27L8.91,8.26L12,2Z"/>
          </svg>
        </button>
      </div>
      <button class="btn" onclick="goToAd('make')">Share On Whatsapp</button>
    </div>
  </section>

</div>

<script>
// ===== SETTINGS =====
const defaultMsg = "සැමට නිදුක් නිරෝගී පොසොන් පෝය දිනයක් වේවා!";
const defaultFrom = "Kamal Fernando";
const MONETAG_LINK = "https://omg10.com/4/11205725"; // <-- මෙතන ඔයාගේ Monetag Link එක විතරක් දාන්න

// 10 AI Wishes List
const posonWishes = [
  "සැමට නිදුක් නිරෝගී පොසොන් පෝය දිනයක් වේවා! 🪷",
  "මහින්ද හිමියන් ගෙනා බුදු දහමේ ආශිර්වාදය සැමට ලැබේවා!",
  "පොසොන් පුර පෝය දවසේ සියලු පින් ඔබ වෙත ලැබේවා! 🙏",
  "මිහිඳු මහ රහතන් වහන්සේ වන්දනා කර පින් ගන්න.",
  "අමෘතවාහිනි දහමේ සෙත සියලු දෙනාටම ලැබේවා!",
  "පොසොන් පෝදා සිතු පැතුම් සඵල වේවා!",
  "මුවන්පැලැස්සේ ශ්‍රී සද්ධර්මය සැමට පහන් වේවා!",
  "පින්බර පොසොන් පෝය දවසක් වේවා! 🌕",
  "මිහිඳු රජුන්ගේ පින්බලයෙන් සියලු දුක් නැසේවා!",
  "ආමිස හා ප්‍රතිපත්ති පූජාවෙන් පින් සිද්ධ වේවා!"
];
let wishIndex = 0;

// ===== FUNCTIONS =====
function getParams() {
  const params = new URLSearchParams(window.location.search);
  return { msg: params.get('msg') || defaultMsg, from: params.get('from') || defaultFrom };
}
function loadCard() {
  const {msg, from} = getParams();
  document.getElementById('wishText').textContent = msg;
  document.getElementById('fromText').textContent = "From: " + from;
  // ===== මල් පොහොට්ටු හදන ෆන්ක්ෂන් එක =====
function createPetals() {
  const petalEmojis = ['🪷', '🌸', '🌼'];
  const petalCount = 40;
  for (let i = 0; i < petalCount; i++) {
    const petal = document.createElement('div');
    petal.classList.add('petal');
    petal.textContent = petalEmojis[Math.floor(Math.random() * petalEmojis.length)];
    petal.style.left = Math.random() * 100 + 'vw';
    petal.style.fontSize = Math.random() * 15 + 10 + 'px';
    petal.style.animationDuration = Math.random() * 5 + 7 + 's';
    petal.style.animationDelay = Math.random() * 5 + 's';
    document.body.appendChild(petal);
  }
}
createPetals(); 
}
function generateWish() {
  const msgInput = document.getElementById('msgInput');
  msgInput.value = posonWishes[wishIndex];
  wishIndex = (wishIndex + 1) % posonWishes.length;
  msgInput.focus();
}

// IMPORTANT: Share = Redirect Page එකට
function goToAd(type) {
  let finalUrl = window.location.href;
  if(type === 'make') {
    const name = document.getElementById('nameInput').value.trim() || "Kamal Fernando";
    const msg = document.getElementById('msgInput').value.trim() || defaultMsg;
    finalUrl = window.location.origin + window.location.pathname + `?msg=${encodeURIComponent(msg)}&from=${encodeURIComponent(name)}`;
  }
  const adPageUrl = `redirect.html?to=${encodeURIComponent(MONETAG_LINK)}&share=${encodeURIComponent(finalUrl)}`;
  window.location.href = adPageUrl;
}

loadCard();
</script>
</body>
</html>
